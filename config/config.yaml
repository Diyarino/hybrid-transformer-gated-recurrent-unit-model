---

general:
    criterion: MSELoss
    optimizer: Adam
    learning_rate: 1.0e-3
    device: cuda
    scheduler: StepLR
    scheduler_parameters:
        step_size: 100
        gamma: 0.1
    
network:
    net_setup: 16-1
    layer: GRU
    layer_parameters:
      bias: True
      dropout: 0.2
      num_layers: 4
      bidirectional: False
      batch_first: True
    pooling: False
    dropout: False
    dropout_parameters: 
      p: 0.1
    batch_norm: False
    batch_norm_parameters:
      momentum: 0.2
    activation: ReLU
    activation_parameters: {}
          